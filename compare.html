<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compare Bodies - ZELEX Atlas</title>
<meta name="description" content="Compare ZELEX body architectures by silhouette ratios, handling class, and buyer-fit signals.">
<link rel="canonical" href="https://www.zelexdoll.com/compare.html">
<meta property="og:title" content="Compare Bodies - ZELEX Atlas">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>
<div class="crumbs"><a href="index.html">Atlas</a><span>&rsaquo;</span> Compare Bodies</div>
<main class="compare-page">
  <section class="compare-hero">
    <div class="eyebrow no-rule">Body Architecture</div>
    <h1>Compare the silhouettes before you choose.</h1>
    <p>Use this as the decision layer between raw product codes and a private inquiry. Add up to four body architectures and compare stature, ratios, family, and buyer-fit signals.</p>
  </section>

  <section class="compare-controls">
    <select class="compare-select" id="bodySelect" aria-label="Choose a body architecture"></select>
    <button class="btn solid" id="addBody" type="button">Add body</button>
    <button class="btn ghost" id="clearBodies" type="button">Clear</button>
    <a class="btn concierge" href="contact.html">Ask concierge</a>
  </section>

  <div id="compareChips" class="compare-chips" aria-label="Bodies on the table"></div>

  <section id="compareMount" aria-live="polite">
    <div class="compare-empty">Loading body profiles...</div>
  </section>
</main>

<script src="assets/site.js"></script>
<script>
ZX.mountNav('compare.html');
ZX.load().then(render).catch(ZX.fail);

const STORAGE_KEY = 'zx_compare_bodies';

function selectedCodes() {
  return ZX.getCompareBodies();
}

function saveCodes(codes) {
  ZX.setCompareBodies(codes);
}

function num(v, suffix) {
  if (v === null || v === undefined || v === '') return '&mdash;';
  return ZX.esc(v) + (suffix || '');
}

function pct(v) {
  if (v === null || v === undefined || v === '') return '&mdash;';
  return Math.round(Number(v) * 100) + '%';
}

function confidenceChip(b) {
  if (b.estimated) return '<span class="stat stat-estimated">Estimated</span>';
  if (b.family_confidence) return '<span class="stat stat-verified">' + ZX.esc(b.family_confidence) + '</span>';
  return '<span class="stat stat-concept">Needs review</span>';
}

function ratioLabel(v, estimated) {
  if (v === null || v === undefined || v === '') return '&mdash;';
  const base = Math.round(Number(v) * 100) + '%';
  return estimated ? base + ' (est.)' : base;
}

function compareSummaryCard(b) {
  const fam = b.family ? '<span class="fam ' + ZX.famClass(b.family) + '">' + ZX.esc(b.family) + '</span>' : '<span class="fam fam--unclassified">Unclassified</span>';
  const optionsHref = 'options.html?tab=body' +
    (b.family ? '&family=' + encodeURIComponent(b.family) : '') +
    '&body=' + encodeURIComponent(b.body_code || '');
  return '<article class="compare-summary-card">' +
    '<div class="top"><h3>' + ZX.esc(b.body_code) + '</h3>' + fam + '</div>' +
    '<div class="grid">' +
      '<div><span class="k">Buyer read</span><b>' + ZX.esc(buyerRead(b)) + '</b></div>' +
      '<div><span class="k">Handling</span><b>' + ZX.esc(handlingRead(b)) + '</b></div>' +
      '<div><span class="k">Shape signal</span><b>WHR ' + ratioLabel(b.WHR, b.estimated) + ' · BWR ' + ratioLabel(b.BWR, b.estimated) + '</b></div>' +
      '<div><span class="k">Data state</span>' + confidenceChip(b) + '</div>' +
    '</div>' +
    '<div style="margin-top:12px"><a class="btn ghost compare-options-link" data-body-code="' + ZX.esc(b.body_code || '') + '" data-family="' + ZX.esc(b.family || '') + '" href="' + optionsHref + '">Open options for this body</a></div>' +
  '</article>';
}

function firstLiveForBody(m, code) {
  const a = m.byBody[code] || [];
  return a.find(c => c.status === 'live') || a[0] || null;
}

function bodyData(m, code) {
  const profileArr = Array.isArray(m.profiles) ? m.profiles : Object.values(m.profiles || {});
  const prof = profileArr.find(p => p.body_code === code) || {};
  const char = firstLiveForBody(m, code);
  const b = (char && char.body) || prof || {};
  return Object.assign({}, prof, b, { body_code: code, character: char });
}

function buyerRead(b) {
  const f = b.family || '';
  if (f === 'The Muse') return 'Natural / realism-forward';
  if (f === 'The Siren') return 'Bust-forward / dramatic';
  if (f === 'The Icon') return 'Glamour / camera-forward';
  if (f === 'The Empress') return 'Plush / abundant';
  if (f === 'The Classic') return 'Balanced / first-buyer safe';
  if (f === 'The Sculpt') return 'Athletic / defined';
  return 'Needs review';
}

function buyerNote(b) {
  const f = b.family || '';
  if (f === 'The Muse') return 'Lifelike proportions, nothing exaggerated';
  if (f === 'The Siren') return 'Fuller bust, pronounced curve through the figure';
  if (f === 'The Icon') return 'Editorial, styled-for-the-shot proportions';
  if (f === 'The Empress') return 'Soft, generous volume across the body';
  if (f === 'The Classic') return 'Even proportions; an easy first choice';
  if (f === 'The Sculpt') return 'Toned, firm lines with clear definition';
  return 'Family not yet confirmed';
}

function buyerCell(b) {
  return '<b class="hl-read">' + ZX.esc(buyerRead(b)) + '</b>' +
    '<span class="hl-note">' + ZX.esc(buyerNote(b)) + '</span>';
}

function handlingRead(b) {
  const w = Number(b.weight_kg || b.weight || 0);
  if (!w) return 'Unknown';
  if (w <= 35) return 'Solo-manageable';
  if (w <= 42) return 'Moderate';
  return 'Dedicated-space preferred';
}

function handlingNote(b) {
  const w = Number(b.weight_kg || b.weight || 0);
  if (!w) return 'Weight not yet on record';
  if (w <= 35) return 'One person can position and store it';
  if (w <= 42) return 'Easier with a stable surface to work on';
  return 'Plan a dedicated space; two-person handling helps';
}

function handlingCell(b) {
  const read = ZX.esc(handlingRead(b));
  return '<b class="hl-read">' + read + '</b>' +
    '<span class="hl-note">' + ZX.esc(handlingNote(b)) + '</span>';
}

function render(m) {
  const codes = Array.from(new Set((m.characters || []).map(c => c.body_code).filter(Boolean))).sort();
  const select = document.getElementById('bodySelect');

  select.innerHTML = codes.map(code => {
    const b = bodyData(m, code);
    const label = [code, b.height_cm ? b.height_cm + 'cm' : null, b.cup ? b.cup + '-cup' : null, b.family].filter(Boolean).join(' | ');
    return '<option value="' + ZX.esc(code) + '">' + ZX.esc(label) + '</option>';
  }).join('');

  document.getElementById('addBody').onclick = () => {
    const code = select.value;
    const cur = selectedCodes().filter(Boolean);
    if (!cur.includes(code)) cur.push(code);
    saveCodes(cur.slice(0, 4));
    ZX.track('compare_set_changed', { action: 'add', compare_count: cur.slice(0, 4).length, body_codes: cur.slice(0, 4).join(','), context: 'compare', source_page: 'compare' });
    ZX.track('compare_add', { body_code: code, compare_count: cur.slice(0, 4).length, context: 'compare', source_page: 'compare' });
    paint(m);
  };

  document.getElementById('clearBodies').onclick = () => {
    const prev = selectedCodes().filter(Boolean).slice(0, 4);
    ZX.track('compare_set_changed', { action: 'clear', previous_count: prev.length, compare_count: 0, body_codes: '', context: 'compare', source_page: 'compare' });
    ZX.track('compare_clear', { previous_count: selectedCodes().filter(Boolean).length, context: 'compare', source_page: 'compare' });
    saveCodes([]);
    paint(m);
  };

  paint(m);
  ZX.mountFooter();
}

function renderChips(m, codes) {
  const wrap = document.getElementById('compareChips');
  if (!wrap) return;
  if (!codes.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = codes.map(code => {
    const b = bodyData(m, code);
    const fam = b.family ? '<span class="fam ' + ZX.famClass(b.family) + '">' + ZX.esc(b.family) + '</span>' : '';
    return '<span class="compare-chip">' +
      '<span class="bcode">' + ZX.esc(code) + '</span>' + fam +
      '<button type="button" class="compare-chip-x" data-code="' + ZX.esc(code) + '" aria-label="Remove ' + ZX.esc(code) + ' from comparison">&times;</button>' +
    '</span>';
  }).join('') + '<span class="compare-chip-count">' + codes.length + ' of 4</span>';

  wrap.querySelectorAll('.compare-chip-x').forEach(function(btn){
    btn.addEventListener('click', function(){
      const code = btn.getAttribute('data-code');
      const next = selectedCodes().filter(Boolean).filter(c => c !== code);
      saveCodes(next);
      ZX.track('compare_set_changed', { action: 'remove', compare_count: next.length, body_codes: next.join(','), context: 'compare', source_page: 'compare' });
      paint(m);
    });
  });
}

function paint(m) {
  const mount = document.getElementById('compareMount');
  const codes = selectedCodes().filter(Boolean).slice(0, 4);

  renderChips(m, codes);

  if (!codes.length) {
    ZX.track('compare_view', { compare_count: 0, view_state: 'empty', context: 'compare', source_page: 'compare' });
    mount.innerHTML =
      '<div class="compare-empty">' +
        '<div class="compare-empty-mark" aria-hidden="true">+</div>' +
        '<h2>Nothing on the table yet.</h2>' +
        '<p>Add two to four body architectures above. We translate the numbers into a plain buyer read &mdash; silhouette character and how the body handles &mdash; so you can decide without doing ratio math.</p>' +
        '<div class="compare-empty-actions">' +
          '<a class="btn solid" id="empty-quiz-link" href="quiz.html">Not sure where to start? Take the quiz</a>' +
          '<a class="btn ghost" id="empty-browse-link" href="browse.html">Browse all bodies</a>' +
        '</div>' +
      '</div>';
    var eq = document.getElementById('empty-quiz-link');
    if (eq) eq.addEventListener('click', function(){ ZX.track('compare_handoff_click', { compare_count: 0, channel: 'quiz', cta: 'take_quiz', view_state: 'empty', context: 'compare', source_page: 'compare' }); });
    var eb = document.getElementById('empty-browse-link');
    if (eb) eb.addEventListener('click', function(){ ZX.track('compare_handoff_click', { compare_count: 0, channel: 'browse', cta: 'browse_bodies', view_state: 'empty', context: 'compare', source_page: 'compare' }); });
    return;
  }

  ZX.track('compare_view', { compare_count: codes.length, body_codes: codes.join(','), view_state: 'filled', context: 'compare', source_page: 'compare' });

  const bodies = codes.map(code => bodyData(m, code));
  const rows = [
    ['Body code', b => '<span class="bcode">' + ZX.esc(b.body_code) + '</span>'],
    ['Series', b => ZX.esc(b.series || '&mdash;')],
    ['Family', b => b.family ? '<span class="fam ' + ZX.famClass(b.family) + '">' + ZX.esc(b.family) + '</span>' : '&mdash;'],
    ['Buyer read', b => buyerCell(b)],
    ['Height', b => num(b.height_cm, 'cm')],
    ['Weight', b => num(b.weight_kg, 'kg')],
    ['Cup', b => b.cup ? ZX.esc(b.cup + '-cup') : '&mdash;'],
    ['Bust | waist | hip', b => num(b.bust_cm || b.bust) + ' | ' + num(b.waist_cm || b.waist) + ' | ' + num(b.hip_cm || b.hip) + ' cm'],
    ['WHR', b => ratioLabel(b.WHR, b.estimated)],
    ['BWR', b => ratioLabel(b.BWR, b.estimated)],
    ['Bust drop', b => num(b.bust_drop_cm, 'cm')],
    ['Handling', b => handlingCell(b)],
    ['Data confidence', b => confidenceChip(b)]
  ];

  const summaries = '<section class="compare-summary" aria-label="Decision summary">' +
    '<div class="section-head" style="margin-top:0">Quick decision read</div>' +
    '<div class="section-sub" style="margin-bottom:14px">Use these summaries to choose which bodies go to concierge inquiry.</div>' +
    '<div class="compare-summary-grid">' + bodies.map(compareSummaryCard).join('') + '</div>' +
  '</section>';

  mount.innerHTML = summaries + '<div class="compare-table-wrap"><table class="compare-table"><thead><tr><th>Signal</th>' +
    bodies.map(b => '<th>' + ZX.esc(b.body_code) + '</th>').join('') +
    '</tr></thead><tbody>' +
    rows.map(r => '<tr><td>' + r[0] + '</td>' + bodies.map(b => '<td>' + r[1](b) + '</td>').join('') + '</tr>').join('') +
    '</tbody></table></div>' +
    '<div class="compare-actions">' +
    '<a class="btn solid" id="compare-contact-link" href="contact.html?compare=' + encodeURIComponent(codes.join(',')) + '&src=compare&cta=ask_about_these_bodies&context=compare&channel=contact">Ask about these bodies</a>' +
    '<a class="btn" id="compare-quiz-link" href="quiz.html">Take the match quiz</a>' +
    '</div>';

  var ctaContact = document.getElementById('compare-contact-link');
  if (ctaContact) {
    ctaContact.addEventListener('click', function() {
      ZX.track('compare_handoff_click', { compare_count: codes.length, body_codes: codes.join(','), channel: 'contact', cta: 'ask_about_these_bodies', context: 'compare', source_page: 'compare' });
    });
  }
  var ctaQuiz = document.getElementById('compare-quiz-link');
  if (ctaQuiz) {
    ctaQuiz.addEventListener('click', function() {
      ZX.track('compare_handoff_click', { compare_count: codes.length, body_codes: codes.join(','), channel: 'quiz', cta: 'take_match_quiz', context: 'compare', source_page: 'compare' });
    });
  }

  document.querySelectorAll('.compare-options-link').forEach(function(link){
    link.addEventListener('click', function(){
      ZX.track('compare_handoff_click', {
        compare_count: codes.length,
        body_codes: codes.join(','),
        body_code: link.getAttribute('data-body-code') || '',
        family: link.getAttribute('data-family') || '',
        channel: 'options',
        cta: 'open_options_for_body',
        context: 'compare',
        source_page: 'compare'
      });
    });
  });
}
</script>
</body>
</html>

<!--
  ZELEX Character Atlas — Analytics Injection Snippet

  Add this to EVERY HTML page in the <head> and <body> sections.

  Load order matters:
  1. ga4-init.js (GTM + GA4 bootstrap, initializes dataLayer)
  2. Event-tracking.js (exposes ZX.EventTracker with all tracking functions)
  3. pii-scrubber.js (wraps ZX.track() to auto-scrub PII before emission)

  Then page-specific initialization can call ZX.track() safely.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ... existing meta tags, stylesheets, etc. ... -->

  <!-- ========== ANALYTICS: GA4 + GTM INITIALIZATION ========== -->
  <!-- This MUST be in <head> and loaded BEFORE any page code -->
  <script src="assets/ga4-init.js"></script>

  <!-- ... rest of head ... -->
</head>
<body>
  <!-- ... page content ... -->

  <!-- ========== ANALYTICS: Core Libraries ========== -->
  <!-- Load these before page-specific tracking -->

  <!-- Site.js (defines ZX.track() and core functionality) -->
  <script src="assets/site.js"></script>

  <!-- PII Scrubber (auto-wraps ZX.track() to remove PII) -->
  <script src="assets/pii-scrubber.js"></script>

  <!-- Event Tracking Module (exposes ZX.EventTracker with 50+ tracking functions) -->
  <script src="assets/event-tracking.js"></script>

  <!-- ========== PAGE-SPECIFIC INITIALIZATION ========== -->
  <script>
    // Example: Track page view
    ZX.EventTracker.trackPageView('navigation');

    // Example: Load model and render
    ZX.load()
      .then(model => {
        ZX.mountNav('index.html');
        ZX.mountFooter();
        // ... render page content ...

        // Track navigation links
        document.querySelectorAll('a[href]').forEach(link => {
          link.addEventListener('click', (e) => {
            const href = link.getAttribute('href');
            const text = link.textContent;
            if (href && !href.startsWith('#')) {
              ZX.EventTracker.trackNavigate('index.html', text, 'navigation');
            }
          });
        });
      })
      .catch(err => {
        ZX.fail();
        ZX.EventTracker.trackErrorPageLoad('data_load_failed', err.message);
      });
  </script>
</body>
</html>

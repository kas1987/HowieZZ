  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ne!important;transition:none!important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:radial-gradient(ellipse at 50% -10%,#1d1c1a,#121212 60%);color:#e8e8e8;font-family:Montserrat,system-ui,sans-serif;line-height:1.6\">\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 32px;border-bottom:1px solid #2a2a2a;background:rgba(18,18,18,.7);backdrop-filter:blur(10px);position:sticky;top:0;z-index:30\">\n    <div style=\"font-family:'Playfair Display',serif;font-weight:700;letter-spacing:5px;font-size:18px;color:#F7E3C3\">ZELE<span style=\"color:#5EA6E8\">X<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:7px;align-items:center\">\n      <a href=\"zelex-intake-guided.html\" style=\"padding:7px 15px;border-radius:100px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:#9a9a9a;border:1px solid #333;transition:.18s\" style-hover=\"color:#e8e8e8;border-color:#9a9a9a\">Guided form<\u002Fa>\n      <span style=\"padding:7px 15px;border-radius:100px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;background:#F7E3C3;color:#111;font-weight:600\">Live configurator<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main style=\"max-width:1240px;margin:0 auto;padding:40px 24px 70px\">\n\n    <div style=\"font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#D4A574;margin-bottom:12px\">Live Configurator<\u002Fdiv>\n    <h1 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.05;letter-spacing:.5px;color:#F7E3C3;margin-bottom:14px\">Shape your character, live.<\u002Fh1>\n    <p style=\"color:#9a9a9a;font-size:15px;line-height:1.7;max-width:560px\">Adjust any option and watch the architecture respond. Tap a filter to focus it — the panel follows what you're editing, with a tip on hand whenever you need one.<\u002Fp>\n\n    <div class=\"filterbar\" style=\"display:flex;gap:8px;overflow-x:auto;margin:28px 0 22px;padding-bottom:6px\">\n      <sc-for list=\"{{ navChips }}\" as=\"n\" hint-placeholder-count=\"9\">\n        <button type=\"button\" style=\"{{ n.style }}\" onclick=\"{{ n.onClick }}\">\n          <span style=\"font-size:9px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7\">{{ n.label }}<\u002Fspan>\n          <span style=\"{{ n.valStyle }}\">{{ n.value }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 430px;gap:26px;align-items:start\">\n\n      <section style=\"position:relative;border:1px solid #2e2a24;border-radius:20px;min-height:560px;overflow:hidden;background:#141312;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 18px rgba(0,0,0,.45)\">\n        <div style=\"position:absolute;left:50%;top:50%;width:560px;height:560px;border-radius:50%;filter:blur(60px);opacity:.5;animation:drift 9s ease-in-out infinite;{{ backdropStyle }}\"><\u002Fdiv>\n\n        <div style=\"position:absolute;top:18px;left:18px;display:flex;flex-direction:column;gap:7px;z-index:2\">\n          <span style=\"{{ famChipStyle }}\">{{ famName }}<\u002Fspan>\n          <sc-if value=\"{{ famDev }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#9EA8B8;background:rgba(158,168,184,.1);border:1px solid rgba(158,168,184,.3);padding:3px 9px;border-radius:100px;width:fit-content\">In development<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"position:absolute;top:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:2;align-items:flex-end\">\n          <sc-for list=\"{{ statItems }}\" as=\"st\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;background:rgba(13,13,13,.6);backdrop-filter:blur(8px);border:1px solid #2e2a24;border-radius:9px;padding:6px 11px\">\n              <span style=\"font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#6f6f6f\">{{ st.k }}<\u002Fspan>\n              <span style=\"{{ st.vStyle }}\">{{ st.v }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <svg class=\"silhouette\" viewBox=\"0 0 300 560\" style=\"position:relative;z-index:1;width:100%;max-width:330px;height:auto;display:block;filter:drop-shadow(0 18px 28px rgba(0,0,0,.5))\">\n          <ellipse cx=\"150\" cy=\"430\" rx=\"92\" ry=\"15\" fill=\"rgba(0,0,0,.32)\"><\u002Fellipse>\n          <ellipse cx=\"{{ hair.cx }}\" cy=\"{{ hair.cy }}\" rx=\"{{ hair.rx }}\" ry=\"{{ hair.ry }}\" fill=\"{{ hairFill }}\"><\u002Fellipse>\n          <ellipse cx=\"{{ hairL.cx }}\" cy=\"{{ hairL.cy }}\" rx=\"{{ hairL.rx }}\" ry=\"{{ hairL.ry }}\" fill=\"{{ hairFill }}\"><\u002Fellipse>\n          <ellipse cx=\"{{ hairR.cx }}\" cy=\"{{ hairR.cy }}\" rx=\"{{ hairR.rx }}\" ry=\"{{ hairR.ry }}\" fill=\"{{ hairFill }}\"><\u002Fellipse>\n          <path d=\"{{ silD }}\" fill=\"{{ skinFill }}\" stroke=\"{{ silStroke }}\" stroke-width=\"1.5\"><\u002Fpath>\n          <circle cx=\"150\" cy=\"74\" r=\"27\" fill=\"{{ skinFill }}\" stroke=\"{{ silStroke }}\" stroke-width=\"1.5\"><\u002Fcircle>\n          <circle cx=\"141\" cy=\"73\" r=\"3.4\" fill=\"{{ eyeFill }}\"><\u002Fcircle>\n          <circle cx=\"159\" cy=\"73\" r=\"3.4\" fill=\"{{ eyeFill }}\"><\u002Fcircle>\n          <line x1=\"{{ waistLine.x1 }}\" y1=\"262\" x2=\"{{ waistLine.x2 }}\" y2=\"262\" stroke=\"{{ guideColor }}\" stroke-width=\"1.4\" stroke-dasharray=\"4 4\" opacity=\".55\"><\u002Fline>\n          <line x1=\"{{ hipLine.x1 }}\" y1=\"322\" x2=\"{{ hipLine.x2 }}\" y2=\"322\" stroke=\"{{ guideColor }}\" stroke-width=\"1.4\" stroke-dasharray=\"4 4\" opacity=\".55\"><\u002Fline>\n        <\u002Fsvg>\n\n        <div style=\"position:absolute;bottom:18px;left:18px;z-index:2\">\n          <div style=\"font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#6f6f6f;margin-bottom:3px\">Working build<\u002Fdiv>\n          <div style=\"font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:#F7E3C3\">{{ famDesc }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:18px;right:18px;z-index:2;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#6f6f6f\">Silhouette diagram · not to scale<\u002Fdiv>\n      <\u002Fsection>\n\n      <aside style=\"border:1px solid #2e2a24;border-radius:20px;background:#161514;position:sticky;top:88px;overflow:hidden\">\n\n        <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"padding:22px 24px 0\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                <div>\n                  <div style=\"font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#6f6f6f;margin-bottom:3px\">Now editing<\u002Fdiv>\n                  <h2 style=\"font-family:'Playfair Display',serif;font-size:23px;font-weight:600;color:#F7E3C3\">{{ panelTitle }}<\u002Fh2>\n                <\u002Fdiv>\n                <button type=\"button\" onclick=\"{{ toggleTip }}\" style=\"{{ tipBtnStyle }}\">?<span style=\"font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-left:5px\">Tip<\u002Fspan><\u002Fbutton>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ tipOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:14px;border:1px solid rgba(212,165,116,.32);background:linear-gradient(140deg,rgba(212,165,116,.1),transparent 70%),#1b1814;border-radius:12px;padding:14px 16px;animation:pop .22s ease both\">\n                  <div style=\"display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#D4A574;margin-bottom:7px\">Concierge tip<\u002Fdiv>\n                  <p style=\"font-size:12.5px;color:#cdb8a0;line-height:1.6\">{{ panelHint }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"padding:20px 24px 22px\">\n\n              <sc-if value=\"{{ panelFamily }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n                  <sc-for list=\"{{ panelFamilies }}\" as=\"f\" hint-placeholder-count=\"6\">\n                    <button type=\"button\" style=\"{{ f.style }}\" onclick=\"{{ f.onClick }}\">\n                      <span style=\"display:flex;align-items:center;gap:8px\">\n                        <span style=\"{{ f.dotStyle }}\"><\u002Fspan>\n                        <span style=\"{{ f.nameStyle }}\">{{ f.name }}<\u002Fspan>\n                      <\u002Fspan>\n                      <span style=\"font-size:11px;color:#9a9a9a;line-height:1.4\">{{ f.desc }}<\u002Fspan>\n                      <span style=\"font-size:10px;letter-spacing:.5px;color:#6f6f6f;font-family:ui-monospace,monospace\">{{ f.whr }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ panelScale }}\" hint-placeholder-val=\"{{ false }}\">\n                <div>\n                  <div style=\"position:relative;padding:2px 0\">\n                    <div style=\"position:absolute;left:9%;right:9%;top:11px;height:5px;border-radius:5px;background:linear-gradient(90deg,#9FD6B6,#D4A574,#E18B73);opacity:.55\"><\u002Fdiv>\n                    <div style=\"position:relative;display:flex\">\n                      <sc-for list=\"{{ realismOpts }}\" as=\"r\" hint-placeholder-count=\"5\">\n                        <button type=\"button\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;font-family:inherit\" onclick=\"{{ r.onClick }}\">\n                          <span style=\"{{ r.nodeStyle }}\"><\u002Fspan>\n                          <span style=\"{{ r.labelStyle }}\">{{ r.label }}<\u002Fspan>\n                        <\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:16px;border:1px solid #2e2a24;border-radius:10px;padding:12px 15px;background:#1b1b1b;font-size:13px;color:#e8e8e8;display:flex;align-items:center;gap:10px\">\n                    <span style=\"width:8px;height:8px;border-radius:50%;flex-shrink:0;{{ realismDotStyle }}\"><\u002Fspan>{{ realismDesc }}\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ panelSwatch }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;gap:18px;flex-wrap:wrap\">\n                  <sc-for list=\"{{ panelSwatches }}\" as=\"sw\" hint-placeholder-count=\"5\">\n                    <button type=\"button\" style=\"display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;font-family:inherit\" onclick=\"{{ sw.onClick }}\">\n                      <span style=\"{{ sw.swatchStyle }}\"><\u002Fspan>\n                      <span style=\"{{ sw.labelStyle }}\">{{ sw.label }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ panelCards }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n                  <sc-for list=\"{{ panelCardList }}\" as=\"o\" hint-placeholder-count=\"4\">\n                    <button type=\"button\" style=\"{{ o.style }}\" onclick=\"{{ o.onClick }}\">\n                      <span style=\"display:flex;align-items:center;justify-content:space-between;width:100%\">\n                        <span style=\"{{ o.iconWrapStyle }}\">{{ o.icon }}<\u002Fspan>\n                        <sc-if value=\"{{ o.sel }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ checkStyle }}\">{{ checkIcon }}<\u002Fspan><\u002Fsc-if>\n                      <\u002Fspan>\n                      <span style=\"{{ o.lblStyle }}\">{{ o.label }}<\u002Fspan>\n                      <span style=\"font-size:11px;line-height:1.4;color:#9a9a9a\">{{ o.sub }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n            <\u002Fdiv>\n\n            <div style=\"border-top:1px solid #2a2620;padding:18px 24px;background:#131211\">\n              <div style=\"font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#D4A574;margin-bottom:12px\">Your build<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px 18px\">\n                <sc-for list=\"{{ buildItems }}\" as=\"b\" hint-placeholder-count=\"8\">\n                  <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:8px\">\n                    <span style=\"font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:#6f6f6f\">{{ b.k }}<\u002Fspan>\n                    <span style=\"{{ b.vStyle }}\">{{ b.v }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <label style=\"display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-top:18px\">\n                <input type=\"checkbox\" checked=\"{{ agree }}\" onchange=\"{{ toggleAgree }}\" style=\"width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:#D4A574;cursor:pointer\">\n                <span style=\"font-size:11.5px;color:#9a9a9a;line-height:1.55\">I'm <strong style=\"color:#e8e8e8\">18+<\u002Fstrong> and understand each character is <strong style=\"color:#e8e8e8\">made to order<\u002Fstrong>. My details are never shared.<\u002Fspan>\n              <\u002Flabel>\n              <sc-if value=\"{{ consentErr }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:11px;color:#E18B73;margin:8px 0 0 26px\">Please confirm you are 18+ to continue.<\u002Fdiv>\n              <\u002Fsc-if>\n\n              <button type=\"button\" onclick=\"{{ submit }}\" style=\"margin-top:16px;width:100%;font-family:'Playfair Display',serif;font-style:italic;letter-spacing:1px;font-size:15px;color:#F7E3C3;padding:15px;border-radius:12px;cursor:pointer;border:1px solid rgba(212,165,116,.45);background:linear-gradient(135deg,rgba(40,32,20,.95),rgba(28,23,16,.95));box-shadow:inset 0 0 0 1px rgba(212,165,116,.2),0 6px 22px rgba(0,0,0,.45);transition:.25s\" style-hover=\"color:#D4A574;box-shadow:inset 0 0 0 1px rgba(212,165,116,.5),0 10px 30px rgba(0,0,0,.55)\">Send this build to concierge<\u002Fbutton>\n              <div style=\"text-align:center;font-size:11px;color:#6f6f6f;margin-top:10px\">Replies within one business day · No obligation<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:40px 28px;animation:fadeup .5s ease both\">\n            <div style=\"font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#9FD6B6;margin-bottom:12px\">Build received<\u002Fdiv>\n            <h2 style=\"font-family:'Playfair Display',serif;font-size:25px;font-weight:600;color:#F7E3C3;margin-bottom:12px\">Your configuration is with us.<\u002Fh2>\n            <p style=\"font-size:13.5px;color:#9a9a9a;line-height:1.7\">We've captured your silhouette, finish, and preferences. A concierge will confirm availability and lead time discreetly — no obligation.<\u002Fp>\n            <button type=\"button\" onclick=\"{{ edit }}\" style=\"margin-top:22px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#D4A574;padding:11px 22px;border:1px solid rgba(212,165,116,.4);border-radius:10px;cursor:pointer;transition:.2s\" style-hover=\"background:#D4A574;color:#111\">Keep editing<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Faside>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startFamily&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;The Classic&quot;,&quot;The Icon&quot;,&quot;The Muse&quot;,&quot;The Siren&quot;,&quot;The Empress&quot;,&quot;The Sculpt&quot;],&quot;default&quot;:&quot;The Muse&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    active: 'family',\n    family: this.props.startFamily || 'The Muse',\n    realism: 2,\n    skin: 'natural', eye: 'hazel', hair: 'brunette',\n    use: 'private', timeline: 'soon', handling: 'space', privacy: 'discreet',\n    tipFor: null, agree: false, consentErr: false, sent: false\n  };\n\n  setActive(g) { this.setState({ active: g }); }\n  pick(f, v) { this.setState({ [f]: v }); }\n  setRealism(i) { this.setState({ realism: i }); }\n  toggleTip() { this.setState(s => ({ tipFor: s.tipFor === s.active ? null : s.active })); }\n  toggleAgree() { this.setState({ agree: !this.state.agree, consentErr: false }); }\n  submit() { if (!this.state.agree) { this.setState({ consentErr: true }); return; } this.setState({ sent: true }); }\n  edit() { this.setState({ sent: false }); }\n\n  renderVals() {\n    const s = this.state;\n    const E = React.createElement;\n    const hexA = (hex, a) => { const h = hex.replace('#', ''); const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16); return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')'; };\n\n    // ---- data ----\n    const SK = [['fair', 'Fair', '#E7C6A8'], ['natural', 'Natural', '#D7A878'], ['wheat', 'Wheat', '#C0884F'], ['tan', 'Tan', '#9C6638'], ['deep', 'Deep', '#6E4424']];\n    const EY = [['blue', 'Blue', '#6E93B8'], ['hazel', 'Hazel', '#8A6A3C'], ['green', 'Green', '#5C7D55'], ['brown', 'Brown', '#4A3326'], ['grey', 'Grey', '#8B8F93'], ['amber', 'Amber', '#AE752C']];\n    const HR = [['blonde', 'Blonde', '#C7A458'], ['brunette', 'Brunette', '#5A3A24'], ['black', 'Black', '#221A15'], ['auburn', 'Auburn', '#7C3C22'], ['silver', 'Silver', '#C7C2BA']];\n    const USE = [['private', 'Private collection', 'collection'], ['photo', 'Photography', 'camera'], ['display', 'Display & styling', 'display'], ['companion', 'Companionship', 'home'], ['undecided', 'Still deciding', 'compass']];\n    const TIME = [['now', 'Ready now', 'bolt', '0–2 weeks'], ['soon', 'Near term', 'clock', '1–2 months'], ['plan', 'Planning', 'calendar', '3+ months'], ['explore', 'Exploring', 'explore', 'No timeline']];\n    const HAND = [['solo', 'Solo-manageable', 'feather', 'Lighter · ~25–30 kg'], ['space', 'Dedicated space', 'anchor', 'Full weight'], ['unsure', 'Not sure', 'scale', 'Advise me']];\n    const PRIV = [['standard', 'Standard', 'box', 'Plain box'], ['discreet', 'Extra discreet', 'shieldCheck', 'No labels'], ['max', 'Maximum', 'shieldLock', 'Personal delivery']];\n    const realStops = ['Natural', 'Soft', 'Balanced', 'Bold', 'Dramatic'];\n    const realColors = ['#9FD6B6', '#BFC79E', '#D4A574', '#DBA188', '#E18B73'];\n    const FAM = {\n      'The Classic': { color: '#8FB7E0', dev: true, m: { bust: 1.00, waist: 1.00, hip: 1.00 }, st: [168, 40], desc: 'Balanced hourglass' },\n      'The Icon': { color: '#D4A574', dev: false, m: { bust: 1.03, waist: 0.95, hip: 1.00 }, st: [172, 39], desc: 'Editorial glamour' },\n      'The Muse': { color: '#9FD6B6', dev: false, m: { bust: 0.98, waist: 0.95, hip: 1.09 }, st: [170, 38], desc: 'Hip-led realism' },\n      'The Siren': { color: '#E18B73', dev: false, m: { bust: 1.17, waist: 0.92, hip: 1.00 }, st: [168, 41], desc: 'Bust-forward drama' },\n      'The Empress': { color: '#C792D6', dev: false, m: { bust: 1.18, waist: 1.12, hip: 1.20 }, st: [164, 46], desc: 'Plush abundance' },\n      'The Sculpt': { color: '#C7B07F', dev: true, m: { bust: 0.98, waist: 0.90, hip: 1.00 }, st: [170, 42], desc: 'Athletic definition' }\n    };\n    const famOrder = ['The Classic', 'The Icon', 'The Muse', 'The Siren', 'The Empress', 'The Sculpt'];\n    const fam = FAM[s.family] || FAM['The Muse'];\n    const fc = fam.color;\n\n    // ---- figure geometry ----\n    const cx = 150;\n    const base = { neck: 15, shoulder: 47, bust: 51, waist: 35, hip: 55, thigh: 41, knee: 24, ankle: 14 };\n    const drama = (s.realism - 2) * 0.06;\n    const bustW = base.bust * fam.m.bust * (1 + drama);\n    const waistW = base.waist * fam.m.waist * (1 - drama);\n    const hipW = base.hip * fam.m.hip * (1 + drama * 0.85);\n    const shoulderW = base.shoulder * (fam.m.bust > 1.05 ? 1.03 : 1.0);\n    const thighW = base.thigh * (hipW / base.hip) * 0.95;\n    const Y = { neck: 118, shoulder: 150, bust: 198, waist: 262, hip: 322, thigh: 388, knee: 448, ankle: 505 };\n    const R = [\n      { x: cx + base.neck, y: Y.neck }, { x: cx + shoulderW, y: Y.shoulder }, { x: cx + bustW, y: Y.bust },\n      { x: cx + waistW, y: Y.waist }, { x: cx + hipW, y: Y.hip }, { x: cx + thighW, y: Y.thigh },\n      { x: cx + base.knee, y: Y.knee }, { x: cx + base.ankle, y: Y.ankle }\n    ];\n    const L = R.map(p => ({ x: cx - (p.x - cx), y: p.y })).reverse();\n    const side = (pts) => { let d = ''; for (let i = 1; i < pts.length; i++) { const a = pts[i - 1], b = pts[i]; const dy = (b.y - a.y) * 0.42; d += 'C ' + a.x.toFixed(1) + ' ' + (a.y + dy).toFixed(1) + ' ' + b.x.toFixed(1) + ' ' + (b.y - dy).toFixed(1) + ' ' + b.x.toFixed(1) + ' ' + b.y.toFixed(1) + ' '; } return d; };\n    const silD = 'M ' + R[0].x.toFixed(1) + ' ' + R[0].y + ' ' + side(R) + 'Q ' + cx + ' ' + (Y.ankle + 18) + ' ' + L[0].x.toFixed(1) + ' ' + L[0].y + ' ' + side(L) + 'Z';\n    const whr = (waistW / hipW).toFixed(2);\n    const bwr = (bustW / waistW).toFixed(2);\n\n    // ---- icons ----\n    let kc = 0;\n    const svg = (kids) => E('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColo .5 11v-1.5a1.5 1.5 0 0 1 3 0V11')])\n    };\n    const check = () => E('svg', { width: 12, height: 12, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.6, strokeLinecap: 'round', strokeLinejoin: 'round' }, [E('path', { key: 'c', d: 'M5 12.5l4.5 4.5L19 7' })]);\n\n    // ---- shared styles ----\n    const card = (sel) => 'display:flex;flex-direction:column;align-items:flex-start;gap:7px;text-align:left;padding:13px 14px;border-radius:12px;cursor:pointer;font-family:inherit;transition:.18s;' + (sel ? 'border:1px solid rgba(212,165,116,.6);background:linear-gradient(140deg,rgba(212,165,116,.14),rgba(212,165,116,.035));box-shadow:inset 0 0 0 1px rgba(212,165,116,.22);' : 'border:1px solid #333;background:#1b1b1b;');\n    const lbl = (sel) => 'font-size:13px;font-weight:600;letter-spacing:.2px;color:' + (sel ? '#F7E3C3' : '#e8e8e8') + ';';\n    const iconWrap = (sel) => 'width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:' + (sel ? '#F7E3C3' : '#D4A574') + ';background:' + (sel ? 'rgba(212,165,116,.18)' : 'rgba(212,165,116,.08)') + ';border:1px solid ' + (sel ? 'rgba(212,165,116,.4)' : 'rgba(212,165,116,.16)') + ';';\n    const checkStyle = 'width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#111;background:#D4A574;';\n\n    // ---- builders ----\n    const swatch = (field, value, label, color) => { const sel = s[field] === value; return { label, swatchStyle: 'width:36px;height:36px;border-radius:50%;background:' + color + ';transition:.18s;border:1px solid rgba(255,255,255,.18);' + (sel ? 'box-shadow:0 0 0 2px #161514,0 0 0 4px #D4A574;transform:scale(1.06);' : ''), labelStyle: 'font-size:10.5px;letter-spacing:.3px;color:' + (sel ? '#F7E3C3' : '#9a9a9a'), onClick: () => this.pick(field, value) }; };\n    const cardOpt = (field, def) => { const [v, label, icon, sub] = def; const sel = s[field] === v; return { label, sub: sub || '', sel, icon: ICON[icon](), iconWrapStyle: iconWrap(sel), style: card(sel), lblStyle: lbl(sel), onClick: () => this.pick(field, v) }; };\n\n    const realismOpts = realStops.map((label, i) => { const sel = s.realism === i; return { label, nodeStyle: sel ? 'width:22px;height:22px;border-radius:50%;background:' + realColors[i] + ';border:2px solid #F7E3C3;box-shadow:0 0 0 4px ' + hexA(realColors[i], .25) : 'width:14px;height:14px;border-radius:50%;background:#2a2a2a;border:1px solid #555', labelStyle: 'font-size:10px;color:' + (sel ? '#F7E3C3' : '#6f6f6f') + ';font-weight:' + (sel ? '600' : '400'), onClick: () => this.setRealism(i) }; });\n    const realDesc = ['As natural and understated as possible.', 'Mostly natural, gently flattering.', 'A balanced, believable presence.', 'Heightened, eye-catching curves.', 'Full dramatic, high-presence energy.'];\n\n    const panelFamilies = famOrder.map(name => { const d = FAM[name]; const sel = s.family === name; return { name: name.replace('The ', ''), desc: d.desc + (d.dev ? ' · in dev' : ''), whr: 'WHR ' + (base.waist * d.m.waist / (base.hip * d.m.hip)).toFixed(2), dotStyle: 'width:11px;height:11px;border-radius:50%;flex-shrink:0;background:' + d.color + (sel ? ';box-shadow:0 0 8px ' + hexA(d.color, .8) : ''), nameStyle: 'font-family:\\'Playfair Display\\',serif;font-size:15.5px;font-weight:600;color:' + (sel ? '#F7E3C3' : '#e8e8e8'), style: card(sel), onClick: () => this.pick('family', name) }; });\n\n    // ---- active group routing ----\n    const A = s.active;\n    const swatchSet = A === 'skin' ? SK.map(a => swatch('skin', a[0], a[1], a[2])) : A === 'eye' ? EY.map(a => swatch('eye', a[0], a[1], a[2])) : A === 'hair' ? HR.map(a => swatch('hair', a[0], a[1], a[2])) : [];\n    const cardSet = A === 'use' ? USE.map(d => cardOpt('use', d)) : A === 'timeline' ? TIME.map(d => cardOpt('timeline', d)) : A === 'handling' ? HAND.map(d => cardOpt('handling', d)) : A === 'privacy' ? PRIV.map(d => cardOpt('privacy', d)) : [];\n\n    const TITLES = { family: 'Body family', realism: 'Realism', skin: 'Skin tone', eye: 'Eye color', hair: 'Hair / wig', use: 'Intended use', timeline: 'Timeline', handling: 'Handling', privacy: 'Shipping & privacy' };\n    const HINTS = {\n      family: 'Family sets the overall silhouette logic — hip-led, bust-forward, balanced, or plush. It is the single biggest choice, and it reshapes the diagram on the left.',\n      realism: 'Slide toward Natural for understated proportions or Dramatic for high-presence curves. This fine-tunes the waist-to-hip ratio you see live.',\n      skin: 'Skin tones here are a starting point — final finish (matte, gloss, blush) is set with your concierge.',\n      eye: 'Eyes are swappable. Pick a base now; heterochromia or custom iris work can be requested later.',\n      hair: 'Wigs are removable and restylable. This previews the everyday look only.',\n      use: 'Telling us how you will enjoy the piece helps us recommend the right finish and durability options.',\n      timeline: 'Made-to-order lead times vary by family and configuration; this just sets expectations.',\n      handling: 'These are full-weight figures. Solo-manageable trims weight; dedicated-space keeps full presence.',\n      privacy: 'Every order is discreet by default. Choose how invisible you need packaging and billing to be.'\n    };\n\n    // ---- nav chips ----\n    const valOf = { family: s.family.replace('The ', ''), realism: realStops[s.realism], skin: (SK.find(a => a[0] === s.skin) || [])[1], eye: (EY.find(a => a[0] === s.eye) || [])[1], hair: (HR.find(a => a[0] === s.hair) || [])[1], use: (USE.find(a => a[0] === s.use) || [])[1], timeline: (TIME.find(a => a[0] === s.timeline) || [])[1], handling: (HAND.find(a => a[0] === s.handling) || [])[1], privacy: (PRIV.find(a => a[0] === s.privacy) || [])[1] };\n    const navChips = ['family', 'realism', 'skin', 'eye', 'hair', 'use', 'timeline', 'handling', 'privacy'].map(k => { const on = A === k; return { label: TITLES[k], value: valOf[k], style: 'flex-shrink:0;display:flex;flex-direction:column;gap:2px;text-align:left;padding:9px 15px;border-radius:11px;cursor:pointer;font-family:inherit;transition:.18s;' + (on ? 'border:1px solid rgba(212,165,116,.6);background:rgba(212,165,116,.1);color:#F7E3C3;' : 'border:1px solid #2e2a24;background:#161514;color:#9a9a9a;'), valStyle: 'font-size:13px;font-weight:600;letter-spacing:.2px;color:' + (on ? '#F7E3C3' : '#e8e8e8'), onClick: () => this.setActive(k) }; });\n\n    // ---- build summary ----\n    const vS = 'font-size:12px;font-weight:600;color:#F7E3C3;text-align:right;letter-spacing:.2px';\n    const buildItems = [\n      { k: 'Family', v: s.family.replace('The ', ''), vStyle: 'font-size:12px;font-weight:600;text-align:right;color:' + fc },\n      { k: 'Realism', v: realStops[s.realism], vStyle: 'font-size:12px;font-weight:600;text-align:right;color:' + realColors[s.realism] },\n      { k: 'Skin', v: valOf.skin, vStyle: vS }, { k: 'Eyes', v: valOf.eye, vStyle: vS },\n      { k: 'Hair', v: valOf.hair, vStyle: vS }, { k: 'Use', v: valOf.use, vStyle: vS },\n      { k: 'Timeline', v: valOf.timeline, vStyle: vS }, { k: 'Privacy', v: valOf.privacy, vStyle: vS }\n    ];\n\n    const statItems = [\n      { k: 'WHR', v: whr, vStyle: 'font-family:ui-monospace,monospace;font-size:13px;font-weight:600;color:' + fc },\n      { k: 'BWR', v: bwr, vStyle: 'font-family:ui-monospace,monospace;font-size:13px;font-weight:600;color:#F7E3C3' },\n      { k: 'Stature', v: fam.st[0] + ' cm · ' + fam.st[1] + ' kg', vStyle: 'font-size:12px;font-weight:500;color:#e8e8e8' },\n      { k: 'Handling', v: valOf.handling, vStyle: 'font-size:12px;font-weight:500;color:#e8e8e8' },\n      { k: 'Privacy', v: valOf.privacy, vStyle: 'font-size:12px;font-weight:500;color:#e8e8e8' }\n    ];\n\n    return {\n      navChips, statItems, buildItems,\n      famName: s.family, famDesc: fam.desc, famDev: fam.dev,\n      famChipStyle: 'display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:' + fc + ';background:' + hexA(fc, .14) + ';border:1px solid ' + hexA(fc, .35) + ';width:fit-content;backdrop-filter:blur(8px)',\n      backdropStyle: 'background:radial-gradient(circle,' + hexA(fc, .55) + ',transparent 68%)',\n      silD, skinFill: (SK.find(a => a[0] === s.skin) || [])[2], silStroke: hexA(fc, .5),\n      hairFill: (HR.find(a => a[0] === s.hair) || [])[2], eyeFill: (EY.find(a => a[0] === s.eye) || [])[2],\n      hair: { cx: 150, cy: 64, rx: 34, ry: 42 }, hairL: { cx: 119, cy: 132, rx: 9, ry: 40 }, hairR: { cx: 181, cy: 132, rx: 9, ry: 40 },\n      guideColor: fc, waistLine: { x1: (cx - waistW).toFixed(1), x2: (cx + waistW).toFixed(1) }, hipLine: { x1: (cx - hipW).toFixed(1), x2: (cx + hipW).toFixed(1) },\n      panelTitle: TITLES[A], panelHint: HINTS[A], tipOpen: s.tipFor === A,\n      tipBtnStyle: 'display:inline-flex;align-items:center;justify-content:center;padding:7px 12px;border-radius:100px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:.18s;' + (s.tipFor === A ? 'border:1px solid rgba(212,165,116,.6);background:rgba(212,165,116,.14);color:#F7E3C3;' : 'border:1px solid #333;color:#9a9a9a;'),\n      panelFamily: A === 'family', panelScale: A === 'realism', panelSwatch: A === 'skin' || A === 'eye' || A === 'hair', panelCards: A === 'use' || A === 'timeline' || A === 'handling' || A === 'privacy',\n      panelFamilies, realismOpts, realismDesc: realDesc[s.realism], realismDotStyle: 'background:' + realColors[s.realism],\n      panelSwatches: swatchSet, panelCardList: cardSet,\n      checkStyle, checkIcon: check(),\n      agree: s.agree, consentErr: s.consentErr, sent: s.sent, notSent: !s.sent,\n      toggleTip: () => this.toggleTip(), toggleAgree: () => this.toggleAgree(), submit: () => this.submit(), edit: () => this.edit()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

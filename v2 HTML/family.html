<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZELEX — Body Families</title>
<meta name="description" content="The six ZELEX body families — Classic, Icon, Muse, Siren, Empress, and Sculpt — each defined by a WHR/BWR proportion signature you can verify with a tape measure.">
<meta name="theme-color" content="#121212">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://www.zelexdoll.com/family.html">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ZELEX — The Character Atlas">
<meta property="og:title" content="Body Families — ZELEX">
<meta property="og:description" content="Six curated silhouette families, each with a defined WHR/BWR proportion signature.">
<meta property="og:url" content="https://www.zelexdoll.com/family.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Body Families — ZELEX">
<meta name="twitter:description" content="Six curated silhouette families, each with a defined WHR/BWR proportion signature.">
<meta name="twitter:image" content="https://www.zelexdoll.com/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
  /* ---- hero ---- */
  .hero{padding:64px 32px 36px;text-align:center;background:radial-gradient(ellipse at top,#1e1e1e,#121212 72%)}
  .hero .eyebrow{margin-bottom:14px}
  .hero h1{font-size:clamp(32px,6vw,60px);font-weight:700;letter-spacing:1px}
  .hero p{color:var(--muted);max-width:620px;margin:14px auto 0;font-size:15px}
  .hero .stats{display:flex;gap:38px;justify-content:center;flex-wrap:wrap;margin-top:28px;color:var(--muted)}
  .hero .stats .n{font-family:'Playfair Display',serif;font-size:30px;color:var(--cream);display:block;line-height:1}
  .hero .stats .l{font-size:var(--t-xs);letter-spacing:2px;text-transform:uppercase;margin-top:6px}

  /* ---- taxonomy explainer (family vs series vs character) ---- */
  .tax-key{max-width:var(--maxw);margin:30px auto 0;padding:0 24px;
    display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  .tax-item{background:var(--s2);border:1px solid var(--b-subtle);border-radius:var(--r-md);
    padding:16px 18px;position:relative}
  .tax-item .tx-eyebrow{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:7px}
  .tax-item h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;line-height:1.1}
  .tax-item p{color:var(--muted);font-size:12.5px;line-height:1.55;margin-top:6px}
  .tax-item .tx-eg{display:block;margin-top:9px;font-size:10.5px;letter-spacing:.4px;color:var(--cream);opacity:.8;font-style:italic}
  .tax-arrow{display:none}
  @media(min-width:760px){
    .tax-key{grid-template-columns:1fr auto 1fr auto 1fr;align-items:stretch}
    .tax-arrow{display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:18px;opacity:.6}
  }

  /* ---- index family card ---- */
  .fam-grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));margin-top:24px}
  .fam-card{position:relative;overflow:hidden;isolation:isolate;
    background:var(--s2);border:1px solid color-mix(in srgb,var(--gold) 28%,transparent);border-radius:var(--r-lg);padding:28px 24px;
    display:flex;flex-direction:column;gap:10px;transition:.25s;cursor:pointer;min-height:240px;
    box-shadow:0 0 0 1px rgba(212,165,116,.10),0 0 24px rgba(212,165,116,.06)}
  .fam-card:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 30px rgba(212,165,116,.14)}
  /* representative photo backdrop (families with bodies) + readability scrim */
  .fam-card .fc-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:top center;
    opacity:.30;transform:scale(1.02);transition:.35s ease}
  .fam-card:hover .fc-bg{opacity:.46;transform:scale(1.06)}
  .fam-card::after{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(20,18,16,.48) 0%,rgba(18,18,18,.82) 58%,rgba(18,18,18,.95) 100%)}
  .fam-card .fc-name,.fam-card .fc-sig,.fam-card .fc-desc,.fam-card .fc-count,.fam-card .fc-ratio{position:relative;z-index:2}
  .fam-card.dev{opacity:.55;cursor:default}
  .fam-card.dev::after{display:none}
  .fam-card.dev:hover{transform:none;border-color:rgba(212,165,116,.28);box-shadow:0 0 0 1px rgba(212,165,116,.10)}
  .fam-card .fc-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.1}
  .fam-card .fc-sig{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .fam-card .fc-desc{font-size:var(--t-base);color:var(--muted);line-height:1.55;flex:1}
  .fam-card .fc-count{font-size:var(--t-sm);letter-spacing:1px;color:var(--muted);border-top:1px solid var(--b-subtle);padding-top:10px;margin-top:auto;
    display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .fam-card .fc-dev{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-style:italic}
  .fam-card .fc-ratio{font-size:11px;letter-spacing:1.4px;color:var(--muted);margin-top:4px;opacity:.75}
  /* premium + buyer rail (measurement-led positioning) */
  .fam-card .fc-rail{position:relative;z-index:2;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted);letter-spacing:.3px;margin-top:2px}
  .fam-card .fc-prem{font-weight:600;color:var(--cream);letter-spacing:.6px}
  .fam-card .fc-buyer{font-style:italic}
  .fam-card .fc-prem::before{content:"";display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin:0 7px 2px 0;vertical-align:middle}
  /* in-development card: keep readable + give it a real next step */
  .fam-card.dev .fc-devnote{position:relative;z-index:2;font-size:11.5px;color:var(--muted);line-height:1.5;font-style:italic;margin-top:2px}
  .fam-card.dev .fc-devcta{position:relative;z-index:2;margin-top:auto;padding-top:10px;border-top:1px solid var(--b-subtle);
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .fam-card.dev .fc-devcta a{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid transparent;transition:.2s;cursor:pointer}
  .fam-card.dev .fc-devcta a:hover{border-color:var(--gold)}
  .dev-narrative{color:var(--muted);font-size:14px;line-height:1.7;max-width:600px;margin:0 auto 28px}
  .dev-cta{text-align:center;margin-top:8px}

  /* ---- family landing header (compact, mirrors series.html proportions) ---- */
  .fam-hero{padding:34px 32px 20px;background:radial-gradient(ellipse at top,#1c1c1c,#121212 70%);text-align:center}
  .fam-hero .eyebrow{margin-bottom:9px;font-size:11px}
  .fam-hero h1{font-size:clamp(26px,4.4vw,44px);font-weight:700;line-height:1;letter-spacing:.5px}
  .fam-hero .sig-line{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:7px}
  .fam-hero p{color:var(--muted);max-width:620px;margin:9px auto 0;font-size:var(--t-base);line-height:1.65}
  .fam-hero .prop-badge{display:inline-flex;gap:18px;flex-wrap:wrap;justify-content:center;
    background:var(--s2);border:1px solid var(--b-subtle);border-radius:var(--r-md);padding:10px 18px;margin-top:16px;font-size:13px}
  .fam-hero .prop-badge .pb-item .pb-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block}
  .fam-hero .prop-badge .pb-item .pb-val{font-family:'Playfair Display',serif;font-size:var(--t-md);color:var(--cream)}
  .fam-hero .fh-meta{display:inline-flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .fam-hero .fh-meta .fh-prem{font-size:12px;letter-spacing:.6px;color:var(--cream);font-weight:600}
  .fam-hero .fh-meta .fh-buyer{font-size:12px;letter-spacing:.4px;color:var(--muted);font-style:italic}
  .fam-hero .fh-meta .fh-sep{width:1px;height:14px;background:var(--line)}
  /* limited / single-character family — honest, not broken */
  .limited-note{max-width:var(--maxw);margin:18px auto 0;padding:14px 18px;
    background:rgba(224,169,69,.07);border:1px solid color-mix(in srgb,var(--st-pending) 30%,transparent);
    border-radius:var(--r-md);color:var(--muted);font-size:13px;line-height:1.6;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .limited-note .ln-tag{flex-shrink:0}
  .limited-note a{color:var(--gold);border-bottom:1px solid transparent;transition:.2s;white-space:nowrap}
  .limited-note a:hover{border-color:var(--gold)}

  /* ---- section heads ---- */
  .sec{margin-top:28px}
  .sec-title{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
  .sec-sub{color:var(--muted);font-size:13px;margin-bottom:22px;max-width:760px}

  /* ---- actions ---- */
  .actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:32px;justify-content:center}

  /* ---- no-content tile ---- */
  .empty-tile{background:var(--s3);border:1px dashed var(--b-subtle);border-radius:12px;padding:36px 20px;
    text-align:center;color:var(--muted);font-size:13px;font-style:italic;grid-column:1/-1}

  /* ---- landing sticky controls bar (view toggle lives here) ---- */
  .landing-controls{position:sticky;top:58px;z-index:40;display:flex;align-items:center;
    justify-content:flex-end;gap:14px;padding:11px 24px;
    background:rgba(18,18,18,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--b-subtle)}
  @media(max-width:600px){.landing-controls{justify-content:center}}

  /* ---- segmented view toggle (pill, matches series.html) ---- */
  .view-toggle{display:inline-flex;border:1px solid var(--b-subtle);border-radius:var(--r-pill);overflow:hidden;
    background:var(--s3);flex-shrink:0}
  .view-toggle button{padding:6px 18px;border:none;background:transparent;
    color:var(--muted);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;
    font-family:inherit;cursor:pointer;transition:.2s;white-space:nowrap}
  .view-toggle button:first-child{border-right:1px solid var(--b-subtle)}
  .view-toggle button.active{background:var(--cream);color:#111;font-weight:600}
  .view-toggle button:not(.active):hover{color:var(--text)}

  /* ---- chars-mode filter bar (below sticky bar) ---- */
  .char-filters{max-width:var(--maxw);margin:14px auto 0;padding:0 24px;
    display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .char-filters .filter-label{font-size:var(--t-xs);letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);white-space:nowrap}
  .cpill{
    padding:5px 14px;border:1px solid var(--b-subtle);border-radius:var(--r-pill);
    background:transparent;color:var(--muted);
    cursor:pointer;font-size:var(--t-sm);letter-spacing:.4px;
    font-family:inherit;transition:.2s;white-space:nowrap;
  }
  .cpill:hover{color:var(--text);border-color:var(--muted)}
  .cpill.active{background:var(--cream);color:#111;border-color:var(--cream);font-weight:600}
  .toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .toggle-wrap input[type=checkbox]{accent-color:var(--gold);width:15px;height:15px;cursor:pointer}
  .toggle-label{font-size:var(--t-sm);color:var(--muted);letter-spacing:.4px;transition:.2s}
  .toggle-wrap:hover .toggle-label{color:var(--text)}

  /* ---- char-mode count bar ---- */
  .char-count{font-size:13px;color:var(--muted);margin:10px 0 14px}
  .char-count strong{color:var(--text)}

  /* ---- landing content area (mirrors series.html .content-area) ---- */
  #landing-app{max-width:var(--maxw);margin:0 auto;padding:0 24px 60px}
</style>
</head>
<body>

<div class="crumbs" id="crumbs"></div>
<div id="hero-slot"></div>
<!-- Sticky controls bar: view toggle (landing only; hidden on index) -->
<div class="landing-controls" id="landing-controls" style="display:none">
  <div class="view-toggle" id="view-toggle">
    <button id="btn-bodies" class="active">Body Architectures</button>
    <button id="btn-chars">Characters</button>
  </div>
</div>
<!-- Chars-mode filter bar (below sticky bar, landing only) -->
<div id="char-filter-outer" style="display:none">
  <div class="char-filters" id="char-filter-bar"></div>
  <div style="max-width:var(--maxw);margin:0 auto;padding:0 24px">
    <div class="char-count" id="char-count"></div>
  </div>
</div>
<main id="app"><div class="loading">Loading catalog…</div></main>
<div id="landing-app" style="display:none"></div>

<script src="assets/site.js"></script>
<script>
ZX.mountNav('family.html');
ZX.load().then(m => { render(m); ZX.mountFooter(); }).catch(() => ZX.fail());

/* ── family descriptors (brand-voice one-liners + proportion signatures) ── */
const FAM_META = {
  "The Classic": {
    desc: "The timeless hourglass — balanced curves, centred mass, a body that reads as effortlessly complete. Proportions tuned to the first-time premium buyer who wants confidence, not spectacle.",
    sig: "Balanced hourglass · WHR 0.68–0.72 · BWR 1.40–1.50",
    whr: "0.68–0.72", bwr: "1.40–1.50",
    premium: "+20%", buyer: "First-time premium buyer"
  },
  "The Icon": {
    desc: "Glamour-model geometry: dramatic waist suppression, elongated torso, a silhouette built for the lens. The architect's choice for editorial shoots and curated Instagram aesthetics.",
    sig: "Glamour model · WHR 0.60–0.65 · BWR 1.50–1.60",
    whr: "0.60–0.65", bwr: "1.50–1.60",
    premium: "+30%", buyer: "Photographer / curator"
  },
  "The Muse": {
    desc: "Long-lined, hip-dominant, low-waist — the European aesthetic archetype. A tall, serene proportion that carries movement and couture with equal grace.",
    sig: "Tall hip-dominant · WHR 0.65–0.70 · BWR 1.30–1.40",
    whr: "0.65–0.70", bwr: "1.30–1.40",
    premium: "+25%", buyer: "European aesthetic buyer"
  },
  "The Siren": {
    desc: "Bust-forward fantasy architecture with a dramatically tapered waist. Maximum visual drama — the silhouette that anchors character, anime-crossover, and fantasy collector builds.",
    sig: "Bust-dominant fantasy · WHR 0.55–0.60 · BWR 1.60–1.75",
    whr: "0.55–0.60", bwr: "1.60–1.75",
    premium: "+35%", buyer: "Character / anime crossover"
  },
  "The Empress": {
    desc: "Maximum plush abundance — soft, generous proportions that celebrate body-positive opulence. The most tactile family in the architecture, and its most unapologetically feminine.",
    sig: "Maximum plush · WHR 0.58–0.64 · BWR 1.55–1.65",
    whr: "0.58–0.64", bwr: "1.55–1.65",
    premium: "+40%", buyer: "Body-positivity collector"
  },
  "The Sculpt": {
    desc: "Athletic musculature rendered in silicone — defined deltoids, articulated abdominals, sculpted glutes. Fitness realism elevated to fine-craft standard.",
    sig: "Muscular definition · WHR 0.65–0.68 · BWR 1.45–1.55",
    whr: "0.65–0.68", bwr: "1.45–1.55",
    premium: "+30%", buyer: "Fitness realism seeker"
  }
};

function render(m) {
  const raw = ZX.qs('f');
  const validFams = new Set(ZX.FAMILIES);
  const f = (raw && validFams.has(raw)) ? raw : null;

  if (!f) {
    renderIndex(m);
  } else {
    renderLanding(m, f);
  }
}

/* ═══════════════════════════════════════════════
   INDEX — grid of all 7 family cards
═══════════════════════════════════════════════ */
function renderIndex(m) {
  document.title = 'ZELEX — Body Families';

  /* breadcrumb */
  document.getElementById('crumbs').innerHTML =
    `<a href="index.html">Atlas</a><span>›</span> Body Families`;

  /* stats */
  const classified = m.characters.filter(c => c.body && c.body.family);
  const classifiedBodies = new Set(classified.map(c => c.body_code));
  const indexBdSrc = ZX.repImg(m.characters, 0);
  const activeFamCount = ZX.FAMILIES.filter(fam =>
    classified.some(c => c.body && c.body.family === fam)).length;
  document.getElementById('hero-slot').innerHTML = `
    <header class="hero has-backdrop">
      ${ZX.heroBackdrop(indexBdSrc)}
      <div class="eyebrow">Body Families</div>
      <h1><span class="em-grad">Six</span> Architectures</h1>
      <p>Every ZELEX body belongs to one of six curated silhouette families — each defined by a measurable WHR/BWR signature, a named premium, and a buyer it was tuned for. Four are in the catalogue today; two are in development.</p>
      <div class="stats">
        <div><span class="n">${activeFamCount}</span><span class="l">Available</span></div>
        <div><span class="n">${classifiedBodies.size}</span><span class="l">Architectures</span></div>
        <div><span class="n">${classified.length}</span><span class="l">Characters</span></div>
      </div>
    </header>
    <div class="tax-key reveal">
      <div class="tax-item">
        <span class="tx-eyebrow">Silhouette</span>
        <h3>Family</h3>
        <p>The proportion signature — defined by waist-to-hip and bust-to-waist ratios you can verify with a tape measure. Six in total.</p>
        <span class="tx-eg">e.g. The Muse · WHR 0.65–0.70</span>
      </div>
      <div class="tax-arrow">→</div>
      <div class="tax-item">
        <span class="tx-eyebrow">Product line</span>
        <h3>Series</h3>
        <p>The manufacturing lineage a body is built in — K-Series, Inspiration, Fusion, or SLE. One family can span several series.</p>
        <span class="tx-eg">e.g. Inspiration · hip-led naturalism</span>
      </div>
      <div class="tax-arrow">→</div>
      <div class="tax-item">
        <span class="tx-eyebrow">Named persona</span>
        <h3>Character</h3>
        <p>A named identity finished on one body — head, styling, and story. Many characters can share a single architecture.</p>
        <span class="tx-eg">e.g. a Muse character on a 170 cm platform</span>
      </div>
    </div>`;

  /* build family body/char counts */
  const famBodies = {}, famChars = {};
  ZX.FAMILIES.forEach(fam => { famBodies[fam] = new Set(); famChars[fam] = 0; });
  m.characters.forEach(c => {
    const fam = c.body && c.body.family;
    if (fam && famBodies[fam]) {
      famBodies[fam].add(c.body_code);
      famChars[fam]++;
    }
  });

  /* one representative photo per family — first live, photographed character */
  const famImg = {};
  m.characters.forEach(c => {
    const fam = c.body && c.body.family;
    if (!fam || famImg[fam] || c.status !== 'live') return;
    const s = ZX.img(c);
    if (s) famImg[fam] = s;
  });

  const cards = ZX.FAMILIES.map((fam, fi) => {
    const meta = FAM_META[fam] || {};
    const color = ZX.famColor(fam);
    const bodyCount = famBodies[fam] ? famBodies[fam].size : 0;
    const charCount = famChars[fam] || 0;
    const hasBodies = bodyCount > 0;
    const d = `d${Math.min(fi + 1, 6)}`;

    const premBuyer = (meta.premium || meta.buyer)
      ? `<div class="fc-rail">${meta.premium ? `<span class="fc-prem">${ZX.esc(meta.premium)} premium</span>` : ''}${meta.buyer ? `<span class="fc-buyer">${ZX.esc(meta.buyer)}</span>` : ''}</div>`
      : '';

    if (!hasBodies) {
      // Honest in-development state: full description + signature + a real next step
      // (open the family brief, or request notification). Never an empty/broken tile.
      return `<a class="fam-card dev reveal ${d}" href="family.html?f=${encodeURIComponent(fam)}" aria-label="${ZX.esc(fam)} — in development">
        <div class="fc-name" style="color:${color}">${ZX.esc(fam)}</div>
        <div class="fc-sig">${ZX.esc((meta.sig || '').split(' · ').slice(1).join(' · '))}</div>
        <div class="fc-desc">${ZX.esc(meta.desc || '')}</div>
        ${premBuyer}
        <div class="fc-devnote">Architectures are in final development — the proportion signature is locked; bodies are not yet in the catalogue.</div>
        <div class="fc-devcta">
          <span class="stat stat-concept">In Development</span>
          <span>Read the brief →</span>
        </div>
      </a>`;
    }

    const bg = famImg[fam]
      ? `<div class="fc-bg" style="background-image:url('${famImg[fam]}')"></div>` : '';
    const limited = charCount <= 1;
    const countLabel = limited
      ? `${bodyCount} architecture${bodyCount !== 1 ? 's' : ''} &middot; ${charCount} character`
      : `${bodyCount} architecture${bodyCount !== 1 ? 's' : ''} &middot; ${charCount} characters`;
    return `<a class="fam-card reveal ${d}" href="family.html?f=${encodeURIComponent(fam)}">
      ${bg}
      <div class="fc-name" style="color:${color}">${ZX.esc(fam)}</div>
      <div class="fc-sig">${ZX.esc((meta.sig || '').split(' · ').slice(1).join(' · '))}</div>
      <div class="fc-desc">${ZX.esc(meta.desc || '')}</div>
      ${premBuyer}
      <div class="fc-count"><span>${countLabel}</span><span class="stat ${limited ? 'stat-pending' : 'stat-live'}">${limited ? 'Limited' : 'Available'}</span></div>
    </a>`;
  }).join('');

  document.getElementById('app').innerHTML =
    `<div class="fam-grid">${cards}</div>
     <div class="actions">
       <a class="btn" href="quiz.html">Find Your Family</a>
       <a class="btn ghost" href="browse.html">Browse Every Character</a>
       <a class="btn ghost" href="compare.html">Compare Side by Side</a>
       <a class="btn solid" href="contact.html">Request a Private Consultation</a>
     </div>`;
  ZX.revealInit();
}

/* ═══════════════════════════════════════════════
   LANDING — single-family detail page
═══════════════════════════════════════════════ */
function renderLanding(m, fam) {
  document.title = `ZELEX — ${fam}`;

  const meta = FAM_META[fam] || {};
  const color = ZX.famColor(fam);

  /* breadcrumb */
  document.getElementById('crumbs').innerHTML =
    `<a href="index.html">Atlas</a><span>›</span><a href="family.html">Families</a><span>›</span> ${ZX.esc(fam)}`;

  /* gather bodies + characters in this family */
  const famChars = m.characters.filter(c => c.body && c.body.family === fam);
  const famBodyCodes = [...new Set(famChars.map(c => c.body_code))];

  /* sort bodies by height_cm asc */
  famBodyCodes.sort((a, b) => {
    const ca = famChars.find(c => c.body_code === a) || {};
    const cb = famChars.find(c => c.body_code === b) || {};
    return ((ca.body || {}).height_cm || 0) - ((cb.body || {}).height_cm || 0);
  });

  /* derive proportion range from actual data */
  const whrs = famChars.map(c => c.body && c.body.WHR).filter(v => v != null);
  const bwrs = famChars.map(c => c.body && c.body.BWR).filter(v => v != null);
  const fmt = arr => arr.length
    ? (arr.length === 1
        ? arr[0].toFixed(2)
        : `${Math.min(...arr).toFixed(2)}–${Math.max(...arr).toFixed(2)}`)
    : null;
  const whrRange = fmt(whrs) || meta.whr || '—';
  const bwrRange = fmt(bwrs) || meta.bwr || '—';

  /* hero */
  const landingBdSrc = ZX.repImg(famChars, 0);
  document.getElementById('hero-slot').innerHTML = `
    <header class="fam-hero has-backdrop">
      ${ZX.heroBackdrop(landingBdSrc)}
      <div class="eyebrow" style="color:${color}">Body Family</div>
      <h1><span class="em-grad">${ZX.esc(fam)}</span></h1>
      <div class="sig-line">${ZX.esc(meta.sig ? meta.sig.split(' · ').slice(1).join(' · ') : '')}</div>
      <p>${ZX.esc(meta.desc || '')}</p>
      ${(meta.premium || meta.buyer) ? `<div class="fh-meta">
        ${meta.premium ? `<span class="fh-prem">${ZX.esc(meta.premium)} premium</span>` : ''}
        ${(meta.premium && meta.buyer) ? `<span class="fh-sep"></span>` : ''}
        ${meta.buyer ? `<span class="fh-buyer">Tuned for the ${ZX.esc(meta.buyer.toLowerCase())}</span>` : ''}
      </div>` : ''}
      <div class="prop-badge">
        <div class="pb-item">
          <span class="pb-label">WHR Range</span>
          <span class="pb-val" style="color:${color}">${ZX.esc(whrRange)}</span>
        </div>
        <div class="pb-item">
          <span class="pb-label">BWR Range</span>
          <span class="pb-val" style="color:${color}">${ZX.esc(bwrRange)}</span>
        </div>
        <div class="pb-item">
          <span class="pb-label">Architectures</span>
          <span class="pb-val" style="color:${color}">${famBodyCodes.length}</span>
        </div>
        <div class="pb-item">
          <span class="pb-label">Characters</span>
          <span class="pb-val" style="color:${color}">${famChars.length}</span>
        </div>
      </div>
    </header>`;

  /* ---- view toggle state ---- */
  let currentView = 'bodies'; /* 'bodies' | 'characters' */

  /* chars-mode state */
  let seriesFilter = 'all'; /* 'all' | series name string */
  let charPhotoOnly = false;

  /* sibling family pills (shared) */
  const siblingPills = ZX.FAMILIES
    .filter(f2 => f2 !== fam)
    .map(f2 => {
      return `<a href="family.html?f=${encodeURIComponent(f2)}" class="fam ${ZX.famClass(f2)}">${ZX.esc(f2)}</a>`;
    }).join('');

  const footerHtml = `
    <div class="sec">
      <div class="sec-title">Other Families</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">${siblingPills}</div>
    </div>
    <div class="actions">
      <a class="btn" href="compare.html">Compare This Family</a>
      <a class="btn ghost" href="browse.html?family=${encodeURIComponent(fam)}">Browse These Characters</a>
      <a class="btn ghost" href="family.html">All Families</a>
      <a class="btn solid" href="contact.html?family=${encodeURIComponent(fam)}">Request a Private Consultation</a>
    </div>`;

  /* Honest "limited" state for thin-but-real families (e.g. Empress n=1):
     a curated note + concierge path, never a near-empty grid presented as the norm. */
  if (famChars.length > 0 && famChars.length <= 1) {
    const inquiry = `mailto:${ZX.INQUIRY_EMAIL}?subject=${encodeURIComponent('ZELEX — ' + fam + ' consultation')}`;
    document.getElementById('hero-slot').insertAdjacentHTML('beforeend',
      `<div class="limited-note reveal">
        <span class="ln-tag stat stat-pending">Limited release</span>
        <span><strong style="color:var(--text)">${ZX.esc(fam)}</strong> is a curated, single-architecture family today — one body, finished as ${famChars.length} character. The proportion signature is fully defined; further architectures are planned. For a made-to-order build in this silhouette, <a href="${inquiry}">speak with the concierge</a> or <a href="compare.html">compare it</a> against a neighbouring family.</span>
      </div>`);
  }

  /* show sticky controls bar (landing only) */
  document.getElementById('landing-controls').style.display = '';
  /* hide the index main, use landing-app instead */
  document.getElementById('app').style.display = 'none';
  document.getElementById('landing-app').style.display = '';

  /* wire up sticky toggle buttons */
  document.getElementById('btn-bodies').addEventListener('click', () => {
    if (currentView === 'bodies') return;
    currentView = 'bodies';
    seriesFilter = 'all';
    charPhotoOnly = false;
    document.getElementById('btn-bodies').classList.add('active');
    document.getElementById('btn-chars').classList.remove('active');
    renderView();
  });
  document.getElementById('btn-chars').addEventListener('click', () => {
    if (currentView === 'characters') return;
    currentView = 'characters';
    seriesFilter = 'all';
    charPhotoOnly = false;
    document.getElementById('btn-bodies').classList.remove('active');
    document.getElementById('btn-chars').classList.add('active');
    renderView();
  });

  const DEV_COPY = {
    "The Classic": {
      narrative: "The Classic is the proportion ZELEX returns to first — a true hourglass where waist, hip, and shoulder resolve into a single, self-evident harmony. WHR 0.68–0.72 places it at the centre of the feminine ideal: nothing exaggerated, nothing withheld. Its architectures are currently in final pre-production review; the first bodies are expected to reach the catalogue within the coming season.",
      subject: "ZELEX — Notify me: The Classic"
    },
    "The Sculpt": {
      narrative: "The Sculpt renders athletic musculature at fine-craft resolution — articulated abdominals, defined deltoids, sculpted posterior — not as caricature but as the body a serious athlete actually inhabits. At WHR 0.65–0.68 it carries the density of the Muse with the surface geometry of the gym. Engineering is underway; first production bodies will enter the catalogue once silicone durability trials are complete.",
      subject: "ZELEX — Notify me: The Sculpt"
    }
  };

  /* ---- BODY ARCHITECTURES section ---- */
  function buildBodySec() {
    if (famBodyCodes.length === 0) {
      const copy = DEV_COPY[fam];
      if (copy) {
        return `<div class="sec">
          <div class="sec-title">Body Architectures</div>
          <p class="dev-narrative">${ZX.esc(copy.narrative)}</p>
          <div class="dev-cta">
            <a class="btn ghost" href="mailto:inquiries@zelexdoll.com?subject=${encodeURIComponent(copy.subject)}">Notify me when available</a>
          </div>
        </div>`;
      }
      return `<div class="sec">
        <div class="sec-title">Body Architectures</div>
        <div class="grid g4"><div class="empty-tile">No architectures catalogued yet — check back soon.</div></div>
      </div>`;
    }
    const bodyCards = famBodyCodes.map((bc, bi) => {
      const d = `d${Math.min(bi + 1, 6)}`;
      return ZX.bodyCard(bc, m).replace(/^(<a class=")/, `$1reveal ${d} `);
    }).join('');
    return `<div class="sec">
      <div class="sec-title">Body Architectures</div>
      <div class="sec-sub">Every ${ZX.esc(fam)} platform — sorted by height, ascending.</div>
      ${ZX.metricsLegend()}
      <div class="grid g4">${bodyCards}</div>
    </div>`;
  }

  /* ---- CHARACTERS section ---- */
  function buildCharContent() {
    /* derive series present in this family, in canonical order */
    const seriesOrder = ZX.SERIES_ORDER || ['K-Series', 'Inspiration', 'Fusion', 'SLE'];
    const presentSeries = new Set(famChars.map(c => c.series).filter(Boolean));
    const orderedSeries = seriesOrder.filter(s => presentSeries.has(s));

    /* apply filters */
    let pool = famChars.slice();
    if (seriesFilter !== 'all') {
      pool = pool.filter(c => c.series === seriesFilter);
    }
    if (charPhotoOnly) {
      pool = pool.filter(c => c.status === 'live');
    }

    /* sort: live first, then height_cm asc, then slot asc */
    pool.sort((a, b) => {
      const aLive = a.status === 'live' ? 0 : 1;
      const bLive = b.status === 'live' ? 0 : 1;
      if (aLive !== bLive) return aLive - bLive;
      const ah = (a.body && a.body.height_cm != null) ? a.body.height_cm : 0;
      const bh = (b.body && b.body.height_cm != null) ? b.body.height_cm : 0;
      if (ah !== bh) return ah - bh;
      return (a.slot || 0) - (b.slot || 0);
    });

    /* total count (respects photoOnly, ignores seriesFilter for denominator) */
    const basePool = charPhotoOnly ? famChars.filter(c => c.status === 'live') : famChars;
    const total = seriesFilter === 'all'
      ? basePool.length
      : basePool.filter(c => c.series === seriesFilter).length;

    /* update filter bar */
    const allActive = seriesFilter === 'all';
    const chips = `<span class="filter-heading">Series</span>`
      + `<button class="pill${allActive ? ' active' : ''}" data-series="all">All</button>`
      + orderedSeries.map(sr => {
          const n = famChars.filter(c => c.series === sr).length;
          const isActive = seriesFilter === sr;
          return `<button class="pill${isActive ? ' active' : ''}" data-series="${ZX.esc(sr)}">${ZX.esc(sr)} <span class="pill-n">${n}</span></button>`;
        }).join('')
      + `<label class="toggle-wrap" style="margin-left:8px">
           <input type="checkbox" id="photo-only-tog"${charPhotoOnly ? ' checked' : ''}>
           <span class="toggle-label">Photographed only</span>
         </label>`;

    document.getElementById('char-filter-bar').innerHTML = chips;
    document.getElementById('char-count').innerHTML =
      `Showing <strong>${pool.length}</strong> of <strong>${total}</strong> character${total !== 1 ? 's' : ''}`;

    const gridHtml = pool.length === 0
      ? `<div class="empty-tile">No characters match the current filters.</div>`
      : pool.map((c, ci) => {
          const d = `d${Math.min(ci + 1, 6)}`;
          return ZX.charCard(c).replace(/^(<a class=")/, `$1reveal ${d} `);
        }).join('');

    return `<div class="sec" id="char-sec">
      <div class="grid g4" id="char-grid">${gridHtml}</div>
    </div>`;
  }

  /* ---- main render ---- */
  function renderView() {
    const filterOuter = document.getElementById('char-filter-outer');
    const landingApp = document.getElementById('landing-app');

    if (currentView === 'bodies') {
      filterOuter.style.display = 'none';
      landingApp.innerHTML = buildBodySec() + footerHtml;
    } else {
      filterOuter.style.display = '';
      landingApp.innerHTML = buildCharContent() + footerHtml;
      bindCharControls();
    }
    ZX.revealInit();
  }

  function bindCharControls() {
    document.getElementById('char-filter-bar').addEventListener('click', e => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      const sr = btn.dataset.series;
      if (sr === undefined) return;
      seriesFilter = sr;
      renderCharInPlace();
    });

    const tog = document.getElementById('photo-only-tog');
    if (tog) tog.addEventListener('change', e => {
      charPhotoOnly = e.target.checked;
      renderCharInPlace();
    });
  }

  /* Re-render chars section in place (filter/count bar + grid) */
  function renderCharInPlace() {
    const landingApp = document.getElementById('landing-app');
    /* preserve footer after char-sec */
    landingApp.innerHTML = buildCharContent() + footerHtml;
    bindCharControls();
    ZX.revealInit();
  }

  renderView();
}
</script>
</body>
</html>
